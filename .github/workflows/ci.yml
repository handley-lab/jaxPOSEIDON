name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JAX_ENABLE_X64: "1"

jobs:
  version-check:
    # Only enforce on PRs — pre-commit + branch protection handle main commits.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version bump
        run: |
          pip install packaging tomli
          python scripts/check_version.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check jaxposeidon/
      - name: Format check
        run: ruff format --check jaxposeidon/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # POSEIDON pins python<3.13, so 3.13 cannot install the oracle.
        # When POSEIDON drops that pin, add 3.13 back here.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system deps for POSEIDON
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev openmpi-bin libhdf5-dev

      - name: Install jaxposeidon + POSEIDON
        run: |
          pip install -e ".[dev]"
          # POSEIDON's own deps; install separately to keep numpy>=2 from
          # jaxposeidon's pin. --no-deps on POSEIDON avoids it dragging
          # numpy<2 back in.
          pip install spectres mpi4py miepython pysynphot pymultinest h5py pandas matplotlib astropy
          pip install --no-deps git+https://github.com/MartianColonist/POSEIDON
          # Provide a stub for libmultinest.so so pymultinest imports succeed.
          mkdir -p $RUNNER_TEMP/poseidon_stubs/pymultinest
          cat > $RUNNER_TEMP/poseidon_stubs/pymultinest/__init__.py <<'EOF'
          def run(*a, **kw): raise RuntimeError("stub")
          class Analyzer:
              def __init__(self, *a, **kw): pass
          EOF
          echo "PYTHONPATH=$RUNNER_TEMP/poseidon_stubs:$PYTHONPATH" >> $GITHUB_ENV

      - name: Test with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=jaxposeidon --cov-report=xml --cov-report=term-missing -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false

  build:
    needs: [test]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and check
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
